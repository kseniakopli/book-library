# CI (задача 62): бэкенд-тесты + фронтенд линт/тесты на каждый push и PR.
# E2E (Playwright) сюда НЕ включён: ему нужен поднятый бэкенд и живые AI-ключи
# (добавление книги фоном дёргает генерацию оформления) — гоняем локально.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Provide prompt config
        # prompt_config.py в .gitignore (приватные промпты) — берём шаблон
        run: cp prompt_config.example.py prompt_config.py
      - name: Run tests
        env:
          # ключи-заглушки: клиенты создаются при импорте, реальных вызовов в тестах нет
          ANTHROPIC_API_KEY: test-dummy
          OPENAI_API_KEY: test-dummy
          GOOGLE_BOOKS_API_KEY: test-dummy
        run: pytest -q
      - name: API contract check (task 75)
        # Перегенерируем снимок OpenAPI и сравниваем с закоммиченным:
        # незамеченное изменение контракта валит CI, а не глаза на ревью.
        # После намеренных правок API: python scripts/dump_openapi.py и закоммитить снимок.
        env:
          ANTHROPIC_API_KEY: test-dummy
          OPENAI_API_KEY: test-dummy
          GOOGLE_BOOKS_API_KEY: test-dummy
        run: |
          python scripts/dump_openapi.py
          git diff --exit-code ../documentation/openapi.json
      - name: Dependency audit (pip-audit, task 41)
        # Аудитим установленное окружение (включая транзитивные зависимости).
        run: |
          pip install --quiet pip-audit
          pip-audit

  frontend:
    name: Frontend (lint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm test
      - name: Dependency audit (npm audit, task 41)
        # Только прод-зависимости и только high/critical — dev-инструменты
        # (vite, vitest) шумят advisories, не попадающими в собранный бандл.
        run: npm audit --omit=dev --audit-level=high
