<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- Полумесяц в тон бренду nocturne. Собран из двух кругов: тело слева,
       вырез справа → месяц «смотрит вправо», как символ ☾ на кнопке темы.
       Чтобы развернуть влево — поменять cx у кругов местами (11 ↔ 16). -->
  <mask id="moon">
    <rect width="24" height="24" fill="#000" />
    <circle cx="11" cy="12" r="9" fill="#fff" />
    <circle cx="16" cy="12" r="8" fill="#000" />
  </mask>
  <rect width="24" height="24" fill="#d68a2e" mask="url(#moon)" />
</svg>
